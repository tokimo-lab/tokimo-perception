[package]
name = "rust-ai"
version = "0.1.0"
edition = "2021"
description = "Unified AI service: OCR + CLIP + Face recognition via ONNX Runtime (library)"

[workspace]

[lib]
name = "rust_ai"
path = "src/lib.rs"

[dependencies]
# Async
tokio = { version = "1", features = ["fs", "sync"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"

# ONNX Runtime
ort = "2.0.0-rc.9"
ndarray = "0.17"

# Image processing
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif", "bmp"] }

# Logging
tracing = "0.1"

# Model download
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
